	<script type="text/javascript">
		window.fLinks = [];
		window.university = {};
		window.cdhlinks = [];
		$.ajax({
			url: $.url('f/newsCenter/ajax_get_category_and_link_list'),
			async: false,
			type: 'POST',
			success: function(res){
				if( res.state == 1 ){
					tplt.draw('navs',{categories: $.out(res,'data.categories')||[]});
					window.fLinks = $.out(res,'data.links')||[];
					window.university = $.out(res,'data.university')||{};
					window.cdhlinks = $.out(res,'data.cdhlinks')||[];
					afterDraw();
				}
			}
		});
		function afterDraw(){
			// 控制请输入搜索关键词显隐
			var v=$.IE.getVersion();
			if($.IE.isIE()){
				if(Number(v)>=9){
					$('.header .search input').on('focus',function(){
						$(this).attr('placeholder','');
					});
					$('.header .search input').on('blur',function(){
						$(this).attr('placeholder','请输入搜索关键词');
					});
				}
			}

			// 控制搜索输入
			$("#askText").keydown(function(e) {
				if (e.keyCode == 13) {
					searchAll();
					return false;
				}
			});
			$('.header .btn_search').on('click',searchAll);

			// 控制导航项平分间距
			$('.header .nav_bar .navs>li').css('width','auto');
			var container_width = $('.header .nav_bar .l_con').width();
			var count_width = 0;
			var count_num = 0;
			$('.header .nav_bar .navs>li').each(function(){
				count_width += $(this).width();
				count_num ++ ;
			});
			var h_padd = parseInt((container_width - count_width)/count_num/2);
			h_padd = h_padd > 85? 85:h_padd
			$('.header .nav_bar .navs li').css({
				'padding-left' : h_padd,
				'padding-right' : h_padd
			});

			// 滚动条滚动事件
			//$(window).on('scroll',scrollFixed);
			//scrollFixed();
			function scrollFixed(){
				var stop = $(window).scrollTop();
				if( stop > 115 ){
					$('.wrapper .header').addClass('header_fixed');
				}else{
					$('.wrapper .header').removeClass('header_fixed');
				}
			}
		}
		function searchAll() {
			var askText = $("#askText").val();
			if ($("#askText").val() == ""
					|| $("#askText").val().replace(/(^\s*)|(\s*$)/g, "") == "") {
				alert("请输入搜索内容");
			} else {
				var pattern = /^[\w\u4e00-\u9fa5]+$/gi;
				if (!pattern.test(askText)) {
					alert("发送内容只能包含中文、数字、字母和下划线");
					return;
				}
				$('.header .search').submit();
			}
		}
	</script>

									<script type="text/html" id="filter">
										<div>
										{{each defaultConfig as $item $key}}
											{{if $item.isNeed}}
												{{if !isEmpty(filter.list[$key])}}

															{{if $item.isNeedAll}}
																<a href="javascript:void(0);" class="{{if filter.params[$key]=='_filter_all'}} active {{/if}}" data-value="_filter_all">全部</a>
															{{/if}}
															{{each filter.list[$key]}}
																<a href="javascript:void(0);" class="{{if filter.params[$key]==$value}} active {{/if}} {{if $value.length >= 4}} padd {{/if}}" data-value="{{$value}}">{{$value}}</a>
															{{/each}}

									<script type="text/javascript">
										function filter() {
											this.fc = null;
											this.calArr = [];
											var _filter = this;
											$('body').on('click', '.filter dd a', function() {
												if ($(this).hasClass('active') || isAjaxIng) {
													return false;
												}
												$(this).parents('dd').find('.active').removeClass('active');
												$(this).addClass('active');
												if ($(this).parent('dd').data('param') == 'zslx') {
													_filter.calArr.forEach(function(item) {
														item({
															params: _filter.getActiveParam()
														});
													});
													return false;
												}
												var params = [];
												for (var key = 0; key < config.length; key++) {
													var $param = $('.filter [data-param="' + config[key]['name'] + '"]');
													if ($param.length != 0) {
														var value = $param.find('.active').data('value') || '';
														params.push(value);
													} else {
														params.push('');
													}
												}
												console.log(params);
												tplt.draw('filter', {
													filter: _filter.fc.get(params),
													defaultConfig: config
												});
												_filter.calArr.forEach(function(item) {
													item({
														params: _filter.getActiveParam()
													});
												});
											});
										};
										filter.prototype.init = function(config, data, initActiveParam) {
											if (this.fc == null) {
												var _filter = this;
												this.fc = new filterCache();
												this.fc.changeConfig(config);
												this.fc.add(data);
												var drawData;
												console.log(initActiveParam);
												if ($.isEmpty(initActiveParam)) {
													drawData = _filter.fc.get();
												} else {
													drawData = _filter.fc.get(initActiveParam);
												}
												$('.filter [data-value="' + drawData.params[0] + '"]').addClass('active');
												console.log(drawData);
												tplt.draw('filter', {
													filter: drawData,
													defaultConfig: config
												});
											}
										}
										filter.prototype.isInit = function() {
											return this.fc != null;
										}
										filter.prototype.change = function(cal) {
											this.calArr.push(cal);
										}
										filter.prototype.getActiveParam = function() {
											var data = {};
											if (this.isInit()) {
												$('.filter .active').each(function() {
													var type = $(this).parent().data('param');
													var value = $(this).data('value');
													if (value != '_filter_all') {
														data[type] = value;
													} else {
														data[type] = '';
													}
												});
											}
											return data;
										}
									</script>

			function getFormData(data) {
				isAjaxIng = true;
				$('.body').height($('.body').height());
				tplt.draw('zsjhTotal', {
					isLoading: true,
					isNeedSex: isNeedSex,
					isNeedCampus: isNeedCampus
				});
				tplt.draw('zsjhList', {
					isLoading: true,
					isNeedSex: isNeedSex,
					isNeedCampus: isNeedCampus
				});
				var isFirst = true;
				$.ajax({
					type: "POST",
					url: $.url('f/ajax_zsjh'),
					data: data,
					success: function(res) {
						if (res.state == 1) {
							var zsjhTotal = res.data.zsjhTotal;
							zsjhGk(zsjhTotal)
							var zsjhList = res.data.zsjhList;
							zsjhZy(zsjhList)
							if(showField1==''){
								$('.header_tit1').hide();
								setTimeout(function() {
									$('#zsjhTotalPlace').hide();
									$('#zsjhTotalPlace').css("opacity", 0)
								}, 100)				
							}else{
								$('.header_tit1').show();
								setTimeout(function() {
									$('#zsjhTotalPlace').show();
									$('#zsjhTotalPlace').css("opacity", 1)
								}, 100)				
							}
							if(showField2==''){
								$('.header_tit2').hide();
								setTimeout(function() {
									$('#zsjhListPlace').hide();
									$('#zsjhListPlace').css("opacity", 0)
								}, 100)
							}else{
								$('.header_tit2').show();
								setTimeout(function() {
									$('#zsjhListPlace').show();
									$('#zsjhListPlace').css("opacity", 1)
								}, 100)
							}
							tplt.draw('zsjhTotal', {
								list: temp1,
								showField1: showField1,
								isNeedSex: isNeedSex,
								isNeedCampus: isNeedCampus
							});
							tplt.draw('zsjhList', {
								list: temp,
								showField2: showField2,
								isNeedSex: isNeedSex,
								isNeedCampus: isNeedCampus
							});
							if (!$.isEmpty($.out(res, 'data.zsjhList'))) {
								initTable();
							}
						} else {
							tplt.draw('zsjhTotal', {
								list: [],
								showField1: showField1,
								isNeedSex: isNeedSex,
								isNeedCampus: isNeedCampus
							});
							tplt.draw('zsjhList', {
								list: [],
								showField2: showField2,
								isNeedSex: isNeedSex,
								isNeedCampus: isNeedCampus
							});
						}
						isAjaxIng = false;
						$('.body').css('height', 'auto');
					},
					error: function() {
						isAjaxIng = false;
						tplt.draw('zsjhTotal', {
							list: [],
							errorTxt: '网络服务错误，请刷新页面',
							isNeedSex: isNeedSex,
							isNeedCampus: isNeedCampus
						});
						tplt.draw('zsjhList', {
							list: [],
							errorTxt: '网络服务错误，请刷新页面',
							isNeedSex: isNeedSex,
							isNeedCampus: isNeedCampus
						});
						$('.body').css('height', 'auto');
					}
				});
			};
			
			function initTable() {
				var header={};
				for(var i=0;i<showField2.length;i++){
					if(showField2[i].isSortColumn==0){
						header[i]={
								sorter: false
							}
					}
				}
				
				// console.log(header)
				$(".sort-table").tablesorter({
					headers: header
				});
			};

			function go_to_zyjs_zy(t) {
				var zyName = $(t).data('zyname');
				var zsnf = $(t).data('zsnf');
				if ($(t).hasClass('active')) {
					return false;
				}
				var load = $.loading();
				$.ajax({
					async: false, // 同步请求
					type: "POST",
					url: $.url('f/ajax_zyjs_zy'),
					data: {
						zyName: zyName,
						zsnf: zsnf
					},
					success: function(res) {
						load.remove();
						if (res.state != 0) {
							window.open('zyjs_zy.html?zyName=' + escape(zyName) + '&zsnf=' + escape(zsnf));
						} else {
							$.noticeTip(1000, res.msg);
							$(t).addClass('active');
						}
					}
				});
			}
