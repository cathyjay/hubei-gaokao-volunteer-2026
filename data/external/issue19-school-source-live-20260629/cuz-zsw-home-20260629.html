	<script type="text/javascript">
		template.helper('toSub',function(html,len){
			len = len||0;
			len = parseInt(len);
			var txt = $('<div/>').html(html).text();
			if(txt.length < len){
				return txt;
			}else{
				return txt.substring(0,len)+'...';
			}
		});
		function newAjax(categoryId,tpltId,arr,newSize,cal){
			var param = {
				categoryId: categoryId,
				pageSize: newSize
			};
			$.ajax({
				url: $.url('f/newsCenter/ajax_category_article_list'),
				async: false,
				type: 'POST',
				data: param,
				success: function(res){
					if(res.state == 1){
						var category = $.out(res.data[0],'category');
						var list = $.out(res.data[0],'contentList')||[];
						tplt.draw(tpltId,{
							category: category,
							list: list
						},arr);
						if(cal){
							cal(category,list);
						}
					}
				}
			});
		}
	</script>

			function oneAfter(){

<script type="text/html" id="footer">

						<div class="code_img" style="margin-left:5px;"></div>

						<div class="txt" style="margin-top:2px;width:100px;">本科招生公众号</div>
						
					</div>
					<div class="code2">
						<div class="code_img"></div>
						<div class="txt">浙江传媒学院</div>
					</div>
				</div>
				<div class="chunk_2">
					<div class="tit">相关链接</div>
					<div class="con" id="fLinksPlace">
						<div class="list_1">
							{{each fLinks}}
								{{if $index < 6}}
									<a href="{{$value.url}}">{{$value.title}}</a>
								{{/if}}
							{{/each}}
						</div>
					</div>
				</div>
				<div class="chunk_3">
					<div class="tit">联系方式</div>
					<div class="con">
						<a href="javascript:void(0);">
							<div class="logo"></div>
						</a>
						{{if !isEmpty(university.phone)}}
							电话：
							{{each university.phone}}
								{{$value}}
								{{if $index != university.phone.length-1}},{{/if}}
							{{/each}}<br>
						{{/if}}
						{{if !isEmpty(university.fax)}}
							传真：
							{{each university.fax}}
								{{$value}}
								{{if $index != university.fax.length-1}},{{/if}}
							{{/each}}<br>
						{{/if}}
						{{if !isEmpty(university.email)}}

							{{each university.email}}
								{{$value}}
								{{if $index != university.email.length-1}},{{/if}}
							{{/each}}<br>
						{{/if}}
						{{if !isEmpty(university.address)}}
							{{each university.address}}
								{{$value}}<br>
							{{/each}}
						{{/if}}
					</div>
				</div>
			</div>
		</div>
		<div class="bottom">

<script type="text/javascript">

	</div>
	<script type="text/javascript">
		$(function(){
			$('body').on('click','.sec_3 .tab_tit .item',function(){
				if($(this).hasClass('active')){
					return false;
				}
				$(this).parent().find('.active').removeClass('active');
				var ind = $(this).addClass('active').index('.item');
				$('.sec_3 .tab_page>li').hide().eq(ind).fadeIn();
			});
			$('.comp_video').each(function(){
				var video = {
					container: '#' + $(this).attr('id'), //容器的ID或className
					variable: 'player', //播放函数名称
					loop: false, //播放结束是否循环播放
					autoplay: false,//是否自动播放
					poster: $(this).data('poster'), //封面图片
					video: [
						[$(this).data('url'), 'video/mp4', '中文标清', 0]
					]
				};
				var player = new ckplayer(video);
			});
		});
	</script>
